<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />

    <!-- ── Viewport ─────────────────────────────────────────────────────────── -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── Favicon & icônes ─────────────────────────────────────────────────── -->
    <!-- Favicon par défaut : mode Antillaise (terracotta) — switché dynamiquement par useFavicon -->
    <link rel="icon" type="image/png" sizes="64x64"  href="/icons/favicon-mode.png" />
    <link rel="icon" type="image/png" sizes="32x32"  href="/icons/favicon-mode-32.png" />
    <link rel="apple-touch-icon" sizes="180x180"     href="/icons/apple-touch-icon.png" />

    <!-- ── PWA ──────────────────────────────────────────────────────────────── -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#7b3225" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="EthniSpirit" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- ── SEO de base (remplacé dynamiquement par react-helmet-async) ───────── -->
    <title>EthniSpirit — Mode Antillaise &amp; Bio Naturel</title>
    <meta name="description" content="Mode antillaise authentique & cosmétiques bio naturels. Bijoux, vêtements, soins — livraison en Martinique, Guadeloupe et DOM-TOM." />
    <meta name="robots" content="index, follow" />

    <!-- ── Open Graph par défaut ────────────────────────────────────────────── -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="EthniSpirit" />
    <meta property="og:title"       content="EthniSpirit — Mode Antillaise &amp; Bio Naturel" />
    <meta property="og:description" content="Mode antillaise authentique & cosmétiques bio naturels. Bijoux, vêtements, soins — livraison en Martinique, Guadeloupe et DOM-TOM." />
    <meta property="og:image"       content="/icons/og-default.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale"      content="fr_FR" />

    <!-- ── Twitter Card par défaut ──────────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="EthniSpirit — Mode Antillaise &amp; Bio Naturel" />
    <meta name="twitter:description" content="Mode antillaise authentique & cosmétiques bio naturels." />
    <meta name="twitter:image"       content="/icons/og-default.png" />

    <!-- ── Polices ──────────────────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,600&family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />

    <!-- ── Font Awesome ──────────────────────────────────────────────────────── -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
